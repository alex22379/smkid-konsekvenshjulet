<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S/M-KIDs Konsekvenshjul</title>

    <!-- Linking resources -->
    <script src="main.js" defer></script>
    <link rel="stylesheet" href="style.css">

    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Favicon -->
    <link rel="icon" type="image/webp" href="assets/smkid_logo.webp" />
    <link rel="icon" type="image/png" href="assets/smkid_logo.png">

    <!-- SEO -->
    <link rel="canonical" href="https://konsekvenshjulet.smkid.dk/" />
</head>

<body class="bg-gray-100">
    <div class="flex flex-col min-h-dvh px-4 py-8 space-y-8">
        <header class="grid place-items-center">
            <a class="flex gap-2 justify-center items-center" href="/"><img class="max-w-20 md:max-w-25 lg:max-w-30"
                    src="assets/smkid_logo.webp" alt="S/M-KIDs logo"><span
                    class="font-extrabold text-2xl md:text-3xl lg:text-5xl text-(--clr-smkid1)"
                    style="font-variant:small-caps;">Konsekvenshjulet</span></a>
        </header>
        <main class="flex flex-col justify-center items-center flex-1">
            <h1 style="display:none;">S/M-KIDs Konsekvenshjul</h1>
            <div class="wheel-wrapper flex flex-col justify-center items-center flex-1 w-full drop-shadow-lg">
                <div id="item"
                    class="bg-(--clr-smkid2) py-3 px-4.5 text-white rounded text-xl font-mono max-w-[60ch] text-center">
                    <span class="italic">(Tryk på hjulet for at spinne 🌀)</span>
                </div>
                <div id="wheel"
                    class="relative cursor-pointer duration-75 border-4 border-white bg-white rounded-full overflow-hidden">
                </div>
            </div>
        </main>
    </div>
    <footer class="bg-gray-200 max-h-dvh flex flex-col">
        <div id="credits" class="px-4 | bg-base-300 grid place-items-center py-3 text-sm">
            <a class="text-sm text-[#17285e] font-medium" href="https://alexandersandholdt.dk" target="_blank">
                Udviklet af Alexander Sandholdt
            </a>
        </div>
    </footer>
</body>

</html>
