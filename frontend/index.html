<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S/M-KIDs Konsekvenshjul</title>

    <!-- Linking resources -->
    <script src="main.js" defer></script> 
    <link rel="stylesheet" href="style.css">

    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Favicon -->

      <link rel="canonical" href="https://konsekvenshjulet.smkid.dk/" />

<body class="bg-gray-100">
    <div class="flex flex-col min-h-dvh p-4 space-y-4">

    <footer class="bg-gray-200 max-h-dvh flex flex-col">

            <a class="text-sm text-[#17285e]" href="https://alexandersandholdt.dk" target="_blank">
                Udviklet af Alexander Sandholdt
            </a>
        </div>
    </footer>

</html>
