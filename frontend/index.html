<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S/M-KIDs Konsekvenshjul</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Favicon -->
     <link rel="icon" href="assets/smkid_logo.png" />
</head>

<body>
    <div class="flex flex-col min-h-dvh p-4 space-y-4 bg-gray-100">
        <header>
            <a class="flex gap-2 justify-center items-center" href="/"><img class="max-w-20"
                    src="assets/smkid_logo.png" alt="S/M-KIDs logo"><span
                    class="font-extrabold text-3xl text-[#0F88BF]"

            <h1 style="display:none;">S/M-KIDs Konsekvenshjul</h1>

                <div id="wheel" class="cursor-pointer hover:scale-101 h-[75dvh] shadow-xl shadow-black/15 aspect-square border-4 border-[#0F88BF] bg-white rounded-full overflow-hidden"></div>
            </div>
        </main>
    </div>
    <footer class="bg-gray-100 max-h-dvh flex flex-col">
        <div class="p-4 flex flex-col flex-1 min-h-0">
            <div id="log" class="text-gray-500 text-sm flex flex-col flex-1 min-h-0">

                <ul class="overflow-y-auto flex-1 min-h-0">
                    <li>

                    </li>
                    <li>
                        <p>ipsum</p>
                    </li>
                    <li>
                        <p>dollar</p>

        <div id="credits" class="flex justify-center items-center py-2 px-4">
            <a class="text-sm text-[#17285e]" href="https://alexandersandholdt.dk" target="_blank">
                Udviklet af Alexander Sandholdt
            </a>
        </div>
    </footer>

</html>
